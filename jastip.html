<!DOCTYPE html>
<html lang="id">

<head>
    <script>
        (function(){var t=localStorage.getItem('theme');if(t)document.documentElement.setAttribute('data-theme',t);else if(window.matchMedia('(prefers-color-scheme: dark)').matches)document.documentElement.setAttribute('data-theme','dark');})();
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="theme-color" content="#fafafa">
    <title>Jastip - Catatan Kontrakan</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="icons/icon-512.png">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body { animation: pageFadeIn 0.15s ease; }
        @keyframes pageFadeIn { from { opacity: 0; } to { opacity: 1; } }

        .page-header {
            align-items: center;
        }

        .section-subtitle {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 22px 0 12px;
            color: var(--text-primary);
            font-size: 0.92rem;
            font-weight: 800;
        }

        .section-subtitle span {
            color: var(--text-muted);
            font-size: 0.72rem;
            font-weight: 650;
        }

        .active-order-card {
            background: var(--green-light);
            border: 1px solid var(--green-medium);
            border-radius: var(--radius-lg);
            padding: var(--space-md);
            margin-bottom: var(--space-md);
            box-shadow: 0 12px 30px rgba(34, 197, 94, 0.1);
        }

        [data-theme="dark"] .active-order-card {
            box-shadow: var(--glow-green);
        }

        .active-order-card.closed {
            background: var(--green-light);
            border-color: var(--yellow-medium);
            box-shadow: 0 12px 30px rgba(34, 197, 94, 0.08);
        }

        .order-head {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: var(--space-sm);
            margin-bottom: var(--space-sm);
        }

        .order-title {
            color: var(--text-primary);
            font-size: 1.15rem;
            line-height: 1.2;
            font-weight: 850;
            overflow-wrap: anywhere;
        }

        .order-meta {
            color: var(--text-secondary);
            font-size: 0.78rem;
            margin-top: 5px;
            line-height: 1.35;
        }

        .owner-chip,
        .status-pill {
            display: inline-flex;
            align-items: center;
            border-radius: var(--radius-full);
            padding: 4px 9px;
            font-size: 0.68rem;
            font-weight: 800;
            white-space: nowrap;
        }

        .owner-chip {
            margin-left: 6px;
            background: var(--bg-card);
            color: var(--text-primary);
        }

        .status-pill.open {
            background: var(--green);
            color: #fff;
        }

        .status-pill.closed {
            background: var(--yellow);
            color: #111;
        }

        .status-pill.completed {
            background: rgba(59, 130, 246, 0.14);
            color: #3b82f6;
        }

        .status-pill.cancelled {
            background: var(--red-medium);
            color: var(--red);
        }

        .order-note {
            padding: 10px 12px;
            border-radius: var(--radius-sm);
            background: rgba(255, 255, 255, 0.45);
            color: var(--text-secondary);
            font-size: 0.8rem;
            line-height: 1.45;
            margin: var(--space-sm) 0;
        }

        [data-theme="dark"] .order-note {
            background: rgba(255, 255, 255, 0.04);
        }

        .shopping-list {
            display: grid;
            gap: 8px;
            margin-top: var(--space-md);
        }

        .shopping-row {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 12px;
        }

        .shopping-row.simple {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            align-items: center;
            gap: var(--space-sm);
        }

        .item-name {
            color: var(--text-primary);
            font-size: 0.95rem;
            font-weight: 800;
            line-height: 1.25;
            overflow-wrap: anywhere;
        }

        .item-meta {
            color: var(--text-muted);
            font-size: 0.74rem;
            margin-top: 4px;
            line-height: 1.35;
            overflow-wrap: anywhere;
        }

        .item-right {
            text-align: right;
            color: var(--text-primary);
            font-weight: 800;
            white-space: nowrap;
        }

        .item-status {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--text-muted);
            font-size: 0.72rem;
            margin-top: 6px;
        }

        .item-status::before {
            content: "";
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--yellow);
        }

        .item-status.bought::before { background: var(--green); }
        .item-status.unavailable::before,
        .item-status.cancelled::before { background: var(--red); }

        .owner-result {
            display: grid;
            gap: 8px;
            margin-top: 10px;
        }

        .owner-result-main {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 8px;
            align-items: center;
        }

        .result-choice {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
        }

        .result-choice button {
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            background: var(--bg-secondary);
            color: var(--text-secondary);
            padding: 10px 8px;
            font: inherit;
            font-size: 0.78rem;
            font-weight: 800;
            cursor: pointer;
        }

        .result-choice button.active[data-status="bought"] {
            border-color: var(--green);
            background: var(--green-light);
            color: var(--green);
        }

        .result-choice button.active[data-status="unavailable"],
        .result-choice button.active[data-status="cancelled"] {
            border-color: var(--red);
            background: var(--red-light);
            color: var(--red);
        }

        .owner-result-fields {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .owner-result select,
        .owner-result input,
        .item-draft-row input,
        .modal input,
        .modal textarea {
            width: 100%;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            border-radius: var(--radius-sm);
            padding: 10px 12px;
            font-size: 0.85rem;
            font-family: inherit;
        }

        .owner-result label {
            display: block;
            color: var(--text-muted);
            font-size: 0.68rem;
            font-weight: 750;
            margin-bottom: 4px;
        }

        .owner-result select:focus,
        .owner-result input:focus,
        .item-draft-row input:focus,
        .modal input:focus,
        .modal textarea:focus {
            outline: none;
            border-color: var(--text-primary);
        }

        .order-actions {
            display: flex;
            gap: var(--space-sm);
            flex-wrap: wrap;
            margin-top: var(--space-md);
        }

        .order-actions .btn {
            flex: 1 1 auto;
        }

        .history-grid {
            display: grid;
            gap: var(--space-sm);
        }

        .history-card {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            align-items: start;
            gap: var(--space-sm);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            background: var(--bg-card);
            padding: var(--space-md);
            cursor: pointer;
            transition: transform 0.15s ease, border-color 0.15s ease;
        }

        .history-card:active {
            transform: scale(0.98);
        }

        .history-card:hover {
            border-color: var(--text-muted);
        }

        .history-title {
            color: var(--text-primary);
            font-weight: 800;
            line-height: 1.25;
            margin-bottom: var(--space-xs);
            overflow-wrap: anywhere;
        }

        .history-amount {
            color: var(--green);
            font-weight: 850;
            white-space: nowrap;
            text-align: right;
        }

        .history-meta {
            color: var(--text-muted);
            font-size: 0.72rem;
            margin-top: 6px;
            line-height: 1.35;
        }

        .empty-jastip {
            padding: 34px 16px;
            text-align: center;
            color: var(--text-muted);
        }

        .item-drafts {
            display: grid;
            gap: var(--space-sm);
            margin-bottom: var(--space-md);
        }

        .item-draft-row {
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            background: var(--bg-primary);
            padding: var(--space-sm);
        }

        .item-draft-grid {
            display: grid;
            grid-template-columns: minmax(0, 1fr) 82px;
            gap: 8px;
        }

        .draft-actions {
            display: flex;
            justify-content: flex-end;
            margin-top: 8px;
        }

        .tiny-btn {
            border: 0;
            background: transparent;
            color: var(--red);
            font: inherit;
            font-size: 0.74rem;
            font-weight: 750;
            cursor: pointer;
            padding: 4px 0;
        }

        .btn[disabled] {
            opacity: 0.45;
            cursor: not-allowed;
        }

        .detail-block {
            display: grid;
            gap: 8px;
            margin-top: var(--space-md);
        }

        .detail-row {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: var(--space-sm);
            align-items: start;
            padding: 10px 0;
            border-bottom: 1px solid var(--border-color);
        }

        .detail-row:last-child {
            border-bottom: 0;
        }

        .detail-total {
            display: flex;
            justify-content: space-between;
            gap: var(--space-sm);
            padding-top: var(--space-md);
            color: var(--text-primary);
            font-weight: 850;
        }

        @media (max-width: 520px) {
            .owner-result-main,
            .owner-result-fields,
            .item-draft-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

    <script src="js/icons.js"></script>
    <script src="js/config.js"></script>
    <script src="js/app.js"></script>
    <script>
        let jastipOrders = [];
        let lastJastipSignature = '';
        let jastipRefreshTimer = null;
        let creatingJastip = false;
        let addingItems = false;
        const savingItems = new Set();
        const orderActions = new Set();

        document.addEventListener('DOMContentLoaded', async () => {
            if (!await checkAuth()) { window.location.href = 'login.html'; return; }
            const openButton = document.getElementById('openJastipButton');
            if (openButton && state.user?.role !== 'admin') openButton.style.display = 'inline-flex';
            await Promise.all([loadNotifications().catch(() => {}), loadJastip()]);
            startJastipRealtimeRefresh();
        });

        async function loadJastip({ silent = false } = {}) {
            const container = document.getElementById('jastipList');
            if (!silent && jastipOrders.length === 0) {
                container.innerHTML = renderSkeletonList(2);
            }
            try {
                const data = await apiGetFresh('jastip');
                const nextOrders = data.orders || [];
                const signature = JSON.stringify(nextOrders);
                if (signature !== lastJastipSignature) {
                    jastipOrders = nextOrders;
                    lastJastipSignature = signature;
                    renderJastip();
                }
                updateJastipRefreshStatus();
            } catch (err) {
                console.error(err);
                updateJastipRefreshStatus('Gagal update');
                if (!silent) {
                    container.innerHTML = renderEmptyState({
                        title: 'Gagal memuat jastip',
                        body: 'Coba lagi, biasanya karena koneksi atau server sedang lambat.',
                        action: 'loadJastip()',
                        actionText: 'Coba Lagi'
                    });
                }
            }
        }

        function updateJastipRefreshStatus(text = '') {
            const el = document.getElementById('jastipRefreshStatus');
            if (!el) return;
            el.textContent = text || `Update ${new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' })}`;
        }

        function startJastipRealtimeRefresh() {
            if (jastipRefreshTimer) return;
            jastipRefreshTimer = setInterval(() => {
                if (document.visibilityState === 'visible') loadJastip({ silent: true });
            }, 5000);
            document.addEventListener('visibilitychange', () => {
                if (document.visibilityState === 'visible') loadJastip({ silent: true });
            });
        }

        function renderJastip() {
            const container = document.getElementById('jastipList');
            const activeOrders = jastipOrders.filter(order => ['open', 'closed'].includes(order.status));
            const historyOrders = jastipOrders.filter(order => !['open', 'closed'].includes(order.status));
            const previewHistory = historyOrders.slice(0, 2);

            if (activeOrders.length === 0 && historyOrders.length === 0) {
                container.innerHTML = renderEmptyState({
                    title: 'Belum ada jastip',
                    body: 'Open jastip kalau ada yang mau belanja keluar dan teman-teman bisa nitip.',
                    action: state.user?.role === 'admin' ? '' : 'openOpenJastipModal()',
                    actionText: 'Open Jastip'
                });
                return;
            }

            container.innerHTML = `
                ${activeOrders.length ? `
                    <div class="section-subtitle">Sedang Aktif <span>${activeOrders.length} jastip</span></div>
                    ${activeOrders.map(renderActiveOrder).join('')}
                ` : '<div class="empty-jastip">Tidak ada jastip aktif sekarang.</div>'}
                ${historyOrders.length ? `
                    <div class="section-subtitle">Riwayat Terbaru <a href="history.html" class="section-link">Semua riwayat</a></div>
                    <div class="history-grid">${previewHistory.map(renderHistoryOrder).join('')}</div>
                ` : ''}
            `;
        }

        function renderActiveOrder(order) {
            const items = order.items || [];
            const canManage = Boolean(order.can_manage);
            const canAdd = order.status === 'open' && !canManage && state.user?.role !== 'admin';
            const pendingCount = items.filter(item => item.status === 'requested').length;
            const boughtCount = items.filter(item => item.status === 'bought').length;
            const unavailableCount = items.filter(item => ['unavailable', 'cancelled'].includes(item.status)).length;
            const canComplete = canManage && order.status === 'closed' && items.length > 0 && pendingCount === 0;

            return `
                <div class="active-order-card ${order.status}">
                    <div class="order-head">
                        <div>
                            <div class="order-title">
                                ${escapeHtml(order.title)}
                                ${order.opened_by === state.user.id ? '<span class="owner-chip">Kamu owner</span>' : ''}
                            </div>
                            <div class="order-meta">Dibuka ${escapeHtml(order.opened_by_name)} - ${relativeTime(order.created_at)}</div>
                        </div>
                        <span class="status-pill ${order.status}">${statusLabel(order.status)}</span>
                    </div>

                    ${order.note ? `<div class="order-note">${escapeHtml(order.note)}</div>` : ''}
                    ${canManage && order.status === 'closed' ? `
                        <div class="order-note">
                            Checklist belanja: ${pendingCount} belum dicek, ${boughtCount} ada, ${unavailableCount} kosong/batal.
                        </div>
                    ` : ''}

                    <div class="shopping-list">
                        ${items.length ? items.map(item => canManage ? renderOwnerItem(order, item) : renderUserItem(order, item)).join('') : '<div class="shopping-row simple"><div class="item-meta">Belum ada nitipan.</div></div>'}
                    </div>

                    <div class="order-actions">
                        ${canAdd ? `<button class="btn btn-primary" onclick="openAddItem(${order.id})">Titip Barang</button>` : ''}
                        ${canManage && order.status === 'open' ? `<button class="btn" onclick="closeJastip(${order.id})">Tutup Nitipan</button>` : ''}
                        ${canManage && order.status === 'closed' ? `<button class="btn" onclick="reopenJastip(${order.id})">Buka Lagi</button>` : ''}
                        ${canManage && order.status === 'closed' ? `<button class="btn btn-success" ${canComplete ? `onclick="completeJastip(${order.id})"` : 'disabled'}>Selesai</button>` : ''}
                        ${canManage && ['open','closed'].includes(order.status) ? `<button class="btn btn-danger" onclick="cancelJastip(${order.id})">Batal</button>` : ''}
                    </div>
                    ${canManage && order.status === 'closed' && !canComplete ? `<div class="item-meta" style="margin-top:8px;">Cek semua item dulu, lalu tekan Selesai.</div>` : ''}
                </div>
            `;
        }

        function renderUserItem(order, item) {
            const mine = item.user_id === state.user.id;
            const canDelete = mine && order.status === 'open';
            const price = Number(item.final_price || 0);
            return `
                <div class="shopping-row simple">
                    <div>
                        <div class="item-name">${escapeHtml(item.item_name)} <span class="item-meta">x${item.requested_qty || 1}</span></div>
                        <div class="item-meta">${escapeHtml(item.user_name)}${item.note ? ' - ' + escapeHtml(item.note) : ''}</div>
                        <div class="item-status ${item.status}">${itemStatusLabel(item.status)}</div>
                        ${canDelete ? `<button class="tiny-btn" onclick="deleteJastipItem(${item.id})">Hapus nitipan</button>` : ''}
                    </div>
                    <div class="item-right">${item.status === 'bought' ? 'Rp ' + price.toLocaleString('id-ID') : itemStatusLabel(item.status)}</div>
                </div>
            `;
        }

        function renderOwnerItem(order, item) {
            const finalPrice = Number(item.final_price || 0);
            const showFields = item.status === 'bought';
            if (order.status === 'open') {
                return `
                    <div class="shopping-row simple">
                        <div>
                            <div class="item-name">${escapeHtml(item.item_name)} <span class="item-meta">x${item.requested_qty || 1}</span></div>
                            <div class="item-meta">${escapeHtml(item.user_name)}${item.note ? ' - ' + escapeHtml(item.note) : ''}</div>
                        </div>
                        <div class="item-right">Belanja</div>
                    </div>
                `;
            }

            return `
                <div class="shopping-row">
                    <div class="shopping-row simple" style="padding:0; border:0; background:transparent;">
                        <div>
                            <div class="item-name">${escapeHtml(item.item_name)} <span class="item-meta">x${item.requested_qty || 1}</span></div>
                            <div class="item-meta">${escapeHtml(item.user_name)}${item.note ? ' - ' + escapeHtml(item.note) : ''}</div>
                        </div>
                        <div class="item-right">${itemStatusLabel(item.status)}</div>
                    </div>
                    ${['open','closed'].includes(order.status) ? `
                        <div class="owner-result">
                            <div class="owner-result-main">
                                <input id="status-${item.id}" type="hidden" value="${escapeAttribute(item.status || 'requested')}">
                                <div class="result-choice" data-item-id="${item.id}">
                                    <button type="button" data-status="bought" class="${item.status === 'bought' ? 'active' : ''}" onclick="setItemStatus(${item.id}, 'bought')">Ada</button>
                                    <button type="button" data-status="unavailable" class="${item.status === 'unavailable' ? 'active' : ''}" onclick="setItemStatus(${item.id}, 'unavailable')">Kosong</button>
                                    <button type="button" data-status="cancelled" class="${item.status === 'cancelled' ? 'active' : ''}" onclick="setItemStatus(${item.id}, 'cancelled')">Batal</button>
                                </div>
                                <button class="btn" onclick="saveItemResult(${item.id})">Simpan</button>
                            </div>
                            <div id="fields-${item.id}" class="owner-result-fields" style="display:${showFields ? 'grid' : 'none'};">
                                <div>
                                    <label>Qty terbeli</label>
                                    <input id="qty-${item.id}" type="number" min="0" value="${item.final_qty ?? ''}" placeholder="Diminta ${item.requested_qty || 1}" inputmode="numeric">
                                </div>
                                <div>
                                    <label>Total harga barang</label>
                                    <input id="price-${item.id}" type="number" min="0" value="${finalPrice > 0 ? Math.round(finalPrice) : ''}" placeholder="Isi harga final" inputmode="numeric">
                                </div>
                            </div>
                            <input id="note-${item.id}" type="text" value="${escapeAttribute(item.final_note || '')}" placeholder="Catatan hasil (opsional)">
                        </div>
                    ` : ''}
                </div>
            `;
        }

        function renderHistoryOrder(order) {
            const items = order.items || [];
            const total = items
                .filter(item => item.status === 'bought')
                .reduce((sum, item) => sum + Number(item.final_price || 0), 0);
            const date = order.completed_at || order.closed_at || order.created_at;
            return `
                <div class="history-card" onclick="openHistoryDetail(${order.id})">
                    <div>
                        <div class="history-title">${escapeHtml(order.title)}</div>
                        <div class="transaction-meta">
                            <span class="transaction-tag piutang">Jastip</span>
                            <span class="transaction-tag">${escapeHtml(order.opened_by_name)}</span>
                            <span class="transaction-tag">${formatDateShort(date)}</span>
                            <span class="transaction-tag">${statusLabel(order.status)}</span>
                        </div>
                    </div>
                    <div class="history-amount">${total ? 'Rp ' + total.toLocaleString('id-ID') : '-'}</div>
                </div>
            `;
        }

        function openHistoryDetail(orderId) {
            const order = jastipOrders.find(item => Number(item.id) === Number(orderId));
            if (!order) {
                showToast('Riwayat jastip tidak ditemukan', 'error');
                return;
            }
            document.getElementById('jastipDetailContent').innerHTML = renderHistoryDetail(order);
            openModal('jastipDetailModal');
        }

        function renderHistoryDetail(order) {
            const items = order.items || [];
            const total = items
                .filter(item => item.status === 'bought')
                .reduce((sum, item) => sum + Number(item.final_price || 0), 0);
            const canDelete = order.opened_by === state.user.id && !['open', 'closed'].includes(order.status);
            return `
                <h3 class="modal-title">${escapeHtml(order.title)}</h3>
                <div class="order-meta">
                    Dibuka ${escapeHtml(order.opened_by_name)} - ${formatDateShort(order.completed_at || order.closed_at || order.created_at)}
                </div>
                <div style="margin-top:10px;"><span class="status-pill ${order.status}">${statusLabel(order.status)}</span></div>
                ${order.note ? `<div class="order-note">${escapeHtml(order.note)}</div>` : ''}
                <div class="detail-block">
                    ${items.length ? items.map(renderHistoryItemDetail).join('') : '<div class="item-meta">Tidak ada item.</div>'}
                </div>
                <div class="detail-total">
                    <span>Total terbeli</span>
                    <span>Rp ${total.toLocaleString('id-ID')}</span>
                </div>
                ${canDelete ? `<button class="btn btn-danger btn-full mt-sm" onclick="deleteJastipOrder(${order.id})">Hapus Riwayat</button>` : ''}
            `;
        }

        function renderHistoryItemDetail(item) {
            const price = Number(item.final_price || 0);
            const qty = item.final_qty || item.requested_qty || 1;
            return `
                <div class="detail-row">
                    <div>
                        <div class="item-name">${escapeHtml(item.item_name)} <span class="item-meta">x${qty}</span></div>
                        <div class="item-meta">${escapeHtml(item.user_name)}${item.note ? ' - ' + escapeHtml(item.note) : ''}</div>
                        ${item.final_note ? `<div class="item-meta">Hasil: ${escapeHtml(item.final_note)}</div>` : ''}
                    </div>
                    <div class="item-right">${item.status === 'bought' ? 'Rp ' + price.toLocaleString('id-ID') : itemStatusLabel(item.status)}</div>
                </div>
            `;
        }

        function statusLabel(status) {
            return ({ open: 'Open', closed: 'Ditutup', completed: 'Selesai', cancelled: 'Batal' })[status] || status;
        }

        function itemStatusLabel(status) {
            return ({ requested: 'Belum dicek', bought: 'Ada', unavailable: 'Kosong', cancelled: 'Batal' })[status] || status;
        }

        function relativeTime(dateStr) {
            const diff = Date.now() - new Date(dateStr).getTime();
            const minutes = Math.max(0, Math.floor(diff / 60000));
            if (minutes < 1) return 'baru saja';
            if (minutes < 60) return `${minutes}m lalu`;
            const hours = Math.floor(minutes / 60);
            if (hours < 24) return `${hours}j lalu`;
            return formatDateShort(dateStr);
        }

        function formatDateShort(dateStr) {
            if (!dateStr) return '-';
            return new Date(dateStr).toLocaleDateString('id-ID', { day: '2-digit', month: 'short' });
        }

        function openOpenJastipModal() {
            if (state.user?.role === 'admin') {
                showToast('Admin hanya untuk monitoring jastip', 'error');
                return;
            }
            document.getElementById('jastipTitle').value = '';
            document.getElementById('jastipNote').value = '';
            setButtonBusy('openJastipSubmit', false, 'Buka Jastip');
            openModal('openJastipModal');
            setTimeout(() => document.getElementById('jastipTitle').focus(), 150);
        }

        function openAddItem(orderId) {
            document.getElementById('itemJastipId').value = orderId;
            document.getElementById('itemDrafts').innerHTML = '';
            addItemDraftRow();
            setButtonBusy('addItemsSubmit', false, 'Titip Sekarang');
            openModal('addJastipItemModal');
        }

        function addItemDraftRow() {
            const container = document.getElementById('itemDrafts');
            const row = document.createElement('div');
            row.className = 'item-draft-row';
            row.innerHTML = `
                <div class="item-draft-grid">
                    <input class="draft-name" type="text" placeholder="Nama barang">
                    <input class="draft-qty" type="number" min="1" inputmode="numeric" placeholder="Jumlah">
                </div>
                <input class="draft-note" type="text" placeholder="Catatan opsional" style="margin-top:8px;">
                <div class="draft-actions"><button class="tiny-btn" onclick="removeItemDraftRow(this)">Hapus item</button></div>
            `;
            container.appendChild(row);
            row.querySelector('.draft-name').focus();
        }

        function removeItemDraftRow(button) {
            const rows = document.querySelectorAll('.item-draft-row');
            if (rows.length <= 1) {
                rows[0].querySelectorAll('input').forEach(input => input.value = '');
                rows[0].querySelector('.draft-name').focus();
                return;
            }
            button.closest('.item-draft-row').remove();
        }

        function toggleResultFields(itemId) {
            const status = document.getElementById(`status-${itemId}`).value;
            const fields = document.getElementById(`fields-${itemId}`);
            if (fields) fields.style.display = status === 'bought' ? 'grid' : 'none';
        }

        function setItemStatus(itemId, status) {
            const input = document.getElementById(`status-${itemId}`);
            if (!input) return;
            input.value = status;
            document.querySelectorAll(`.result-choice[data-item-id="${itemId}"] button`).forEach(button => {
                button.classList.toggle('active', button.dataset.status === status);
            });
            const qtyInput = document.getElementById(`qty-${itemId}`);
            if (status === 'bought' && qtyInput && !qtyInput.value) {
                const item = jastipOrders.flatMap(order => order.items || []).find(row => Number(row.id) === Number(itemId));
                qtyInput.value = item?.requested_qty || 1;
            }
            toggleResultFields(itemId);
        }

        async function createJastip() {
            if (creatingJastip) return;
            const title = document.getElementById('jastipTitle').value.trim();
            const note = document.getElementById('jastipNote').value.trim();
            if (!title) { showToast('Tujuan jastip wajib diisi', 'error'); return; }

            creatingJastip = true;
            setButtonBusy('openJastipSubmit', true, 'Membuka...');
            try {
                const result = await apiPost('jastip?action=create', { title, note });
                closeModal('openJastipModal');
                showToast(result.duplicate ? 'Jastip sudah kebuka' : 'Jastip dibuka', 'success');
                await loadJastip();
                refreshActiveJastipBanner({ force: true });
            } catch (err) {
                showToast(err.message || 'Gagal buka jastip', 'error');
            } finally {
                creatingJastip = false;
                setButtonBusy('openJastipSubmit', false, 'Buka Jastip');
            }
        }

        async function addJastipItems() {
            if (addingItems) return;
            const jastipId = parseInt(document.getElementById('itemJastipId').value, 10);
            const items = Array.from(document.querySelectorAll('.item-draft-row')).map(row => ({
                item_name: row.querySelector('.draft-name').value.trim(),
                requested_qty: parseInt(row.querySelector('.draft-qty').value || '1', 10) || 1,
                note: row.querySelector('.draft-note').value.trim(),
            })).filter(item => item.item_name);

            if (items.length === 0) {
                showToast('Isi minimal satu barang', 'error');
                return;
            }

            addingItems = true;
            setButtonBusy('addItemsSubmit', true, 'Mengirim...');
            try {
                await apiPost('jastip?action=items', { jastip_id: jastipId, items });
                closeModal('addJastipItemModal');
                showToast(`${items.length} nitipan masuk`, 'success');
                await loadJastip();
                refreshActiveJastipBanner({ force: true });
            } catch (err) {
                showToast(err.message || 'Gagal nitip barang', 'error');
            } finally {
                addingItems = false;
                setButtonBusy('addItemsSubmit', false, 'Titip Sekarang');
            }
        }

        async function saveItemResult(itemId) {
            if (savingItems.has(itemId)) return;
            const status = document.getElementById(`status-${itemId}`).value;
            const finalQtyInput = document.getElementById(`qty-${itemId}`);
            const finalPriceInput = document.getElementById(`price-${itemId}`);
            const finalNote = document.getElementById(`note-${itemId}`).value.trim();
            const payload = {
                item_id: itemId,
                status,
                final_qty: status === 'bought' ? finalQtyInput.value : '',
                final_price: status === 'bought' ? finalPriceInput.value : '',
                final_note: finalNote,
            };

            savingItems.add(itemId);
            try {
                await apiPut('jastip?action=item', payload);
                showToast('Hasil disimpan', 'success');
                await loadJastip();
            } catch (err) {
                showToast(err.message || 'Gagal simpan hasil', 'error');
            } finally {
                savingItems.delete(itemId);
            }
        }

        async function closeJastip(id) {
            const key = `close-${id}`;
            if (orderActions.has(key)) return;
            orderActions.add(key);
            try {
                await apiPut('jastip?action=close', { id });
                showToast('Jastip ditutup', 'success');
                await loadJastip();
                refreshActiveJastipBanner({ force: true });
            } catch (err) {
                showToast(err.message || 'Gagal tutup jastip', 'error');
            } finally {
                orderActions.delete(key);
            }
        }

        async function reopenJastip(id) {
            const key = `reopen-${id}`;
            if (orderActions.has(key)) return;
            orderActions.add(key);
            try {
                await apiPut('jastip?action=reopen', { id });
                showToast('Jastip dibuka lagi', 'success');
                await loadJastip();
                refreshActiveJastipBanner({ force: true });
            } catch (err) {
                showToast(err.message || 'Gagal buka lagi jastip', 'error');
            } finally {
                orderActions.delete(key);
            }
        }

        async function cancelJastip(id) {
            if (!confirm('Batalkan jastip ini?')) return;
            const key = `cancel-${id}`;
            if (orderActions.has(key)) return;
            orderActions.add(key);
            try {
                await apiPut('jastip?action=cancel', { id });
                showToast('Jastip dibatalkan', 'success');
                await loadJastip();
                refreshActiveJastipBanner({ force: true });
            } catch (err) {
                showToast(err.message || 'Gagal batalkan jastip', 'error');
            } finally {
                orderActions.delete(key);
            }
        }

        async function completeJastip(id) {
            if (!confirm('Selesaikan jastip dan buat tagihan otomatis?')) return;
            const key = `complete-${id}`;
            if (orderActions.has(key)) return;
            orderActions.add(key);
            try {
                const result = await apiPut('jastip?action=complete', { id });
                showToast('Jastip selesai: Rp ' + Number(result.amount || 0).toLocaleString('id-ID'), 'success');
                await loadJastip();
                refreshActiveJastipBanner({ force: true });
            } catch (err) {
                showToast(err.message || 'Gagal selesaikan jastip', 'error');
            } finally {
                orderActions.delete(key);
            }
        }

        async function deleteJastipItem(itemId) {
            if (!confirm('Hapus nitipan ini?')) return;
            const key = `delete-item-${itemId}`;
            if (orderActions.has(key)) return;
            orderActions.add(key);
            try {
                await apiDelete('jastip?item_id=' + itemId);
                showToast('Nitipan dihapus', 'success');
                await loadJastip();
                refreshActiveJastipBanner({ force: true });
            } catch (err) {
                showToast(err.message || 'Gagal hapus nitipan', 'error');
            } finally {
                orderActions.delete(key);
            }
        }

        async function deleteJastipOrder(orderId) {
            if (!confirm('Hapus riwayat jastip ini? Transaksi tagihan yang sudah dibuat tidak ikut dihapus.')) return;
            const key = `delete-order-${orderId}`;
            if (orderActions.has(key)) return;
            orderActions.add(key);
            try {
                await apiDelete('jastip?action=order&order_id=' + orderId);
                closeModal('jastipDetailModal');
                showToast('Riwayat jastip dihapus', 'success');
                await loadJastip();
                refreshActiveJastipBanner({ force: true });
            } catch (err) {
                showToast(err.message || 'Gagal hapus riwayat jastip', 'error');
            } finally {
                orderActions.delete(key);
            }
        }

        function setButtonBusy(id, busy, text) {
            const btn = document.getElementById(id);
            if (!btn) return;
            btn.disabled = busy;
            btn.textContent = text;
        }
    </script>
</body>

</html>
