<!DOCTYPE html>
<html lang="id">

<head>
    <script>
        // Set theme ASAP to prevent white flash
        (function(){var t=localStorage.getItem('theme');if(t)document.documentElement.setAttribute('data-theme',t);else if(window.matchMedia('(prefers-color-scheme: dark)').matches)document.documentElement.setAttribute('data-theme','dark');})();
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="theme-color" content="#f5f5f7">
    <title>Riwayat - Catatan Kontrakan</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="icons/icon-512.png">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body { animation: pageFadeIn 0.15s ease; }
        @keyframes pageFadeIn { from { opacity: 0; } to { opacity: 1; } }
        .sticky-header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--bg-primary);
            padding-top: var(--space-md);
            padding-bottom: var(--space-sm);
        }

        .search-filter {
            display: flex;
            gap: var(--space-sm);
            margin-bottom: var(--space-md);
        }

        .search-input {
            flex: 1;
            padding: var(--space-sm) var(--space-md);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-full);
            background: var(--bg-card);
            color: var(--text-primary);
            font-size: 0.875rem;
            font-family: inherit;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--text-primary);
        }

        .date-filter {
            display: flex;
            gap: var(--space-sm);
            margin-bottom: var(--space-sm);
            flex-wrap: wrap;
        }

        .date-input {
            flex: 1;
            min-width: 100px;
            padding: var(--space-sm) var(--space-md);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-full);
            background: var(--bg-card);
            color: var(--text-primary);
            font-size: 0.8125rem;
            font-family: inherit;
        }

        .date-input:focus {
            outline: none;
            border-color: var(--text-primary);
        }

        .btn-clear {
            padding: var(--space-sm) var(--space-md);
            border-radius: var(--radius-full);
            font-size: 0.75rem;
        }

        .jastip-detail-meta {
            color: var(--text-muted);
            font-size: 0.75rem;
            margin-top: 4px;
            line-height: 1.35;
        }

        .jastip-pill {
            display: inline-flex;
            align-items: center;
            border-radius: var(--radius-full);
            padding: 4px 9px;
            font-size: 0.68rem;
            font-weight: 800;
            white-space: nowrap;
            background: var(--bg-secondary);
            color: var(--text-muted);
        }

        .jastip-pill.completed { color: #3b82f6; background: rgba(59, 130, 246, 0.14); }
        .jastip-pill.cancelled { color: var(--red); background: var(--red-medium); }

        .jastip-detail-list {
            display: grid;
            gap: 8px;
            margin-top: var(--space-md);
        }

        .jastip-detail-row {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: var(--space-sm);
            padding: 10px 0;
            border-bottom: 1px solid var(--border-color);
        }

        .jastip-detail-row:last-child {
            border-bottom: 0;
        }

        .jastip-detail-name {
            color: var(--text-primary);
            font-weight: 700;
            overflow-wrap: anywhere;
        }

        .jastip-detail-total {
            display: flex;
            justify-content: space-between;
            gap: var(--space-sm);
            padding-top: var(--space-md);
            font-weight: 800;
        }
    </style>
    <link rel="prefetch" href="dashboard.html">
    <link rel="prefetch" href="settle.html">
</head>

<body>
    <div class="container">
        <!-- Sticky Header -->
        <div class="sticky-header">
            <div class="page-header">
                <h1 class="page-title">Riwayat</h1>
                <button class="icon-btn" onclick="toggleTheme()"><span class="theme-toggle-icon"></span></button>
            </div>

            <!-- Filter -->
            <div class="filter-scroll"
                style="display: flex; gap: var(--space-sm); margin-bottom: var(--space-sm); overflow-x: auto; padding-bottom: var(--space-xs); -webkit-overflow-scrolling: touch;">
                <button class="btn filter-btn active" data-category=""
                    style="border-radius: var(--radius-full);">Semua</button>
                <button class="btn filter-btn" data-category="Listrik"
                    style="border-radius: var(--radius-full);">Listrik</button>
                <button class="btn filter-btn" data-category="Galon"
                    style="border-radius: var(--radius-full);">Galon</button>
                <button class="btn filter-btn" data-category="Air"
                    style="border-radius: var(--radius-full);">Air</button>
                <button class="btn filter-btn" data-category="Keamanan & Kebersihan"
                    style="border-radius: var(--radius-full);">Keamanan</button>
                <button class="btn filter-btn" data-category="Titip Makanan"
                    style="border-radius: var(--radius-full);">Makanan</button>
                <button class="btn filter-btn" data-category="Jastip"
                    style="border-radius: var(--radius-full);">Jastip</button>
            </div>

            <!-- Search -->
            <div class="search-filter">
                <input type="text" class="search-input" id="searchInput" placeholder="Cari transaksi...">
            </div>

            <!-- Date Filter -->
            <div class="date-filter">
                <input type="date" class="date-input" id="fromDate">
                <input type="date" class="date-input" id="toDate">
                <button class="btn btn-clear" onclick="clearFilters()">Reset</button>
            </div>
        </div>

        <!-- Listrik Stats Section (shows when Listrik filter active) -->
        <div class="section listrik-stats" id="listrikStatsSection" style="display: none;">
            <div style="text-align: center; margin-bottom: var(--space-md);">
                <div style="font-size: 0.75rem; color: var(--yellow);">⚡ GILIRAN SELANJUTNYA</div>
                <div style="font-size: 1.125rem; font-weight: 700; margin-top: var(--space-xs);" id="nextListrikPayers">
                    -</div>
            </div>
            <div id="listrikStatsList"
                style="margin-top: var(--space-md); padding-top: var(--space-md); border-top: 1px solid var(--border-color);">
            </div>
        </div>

        
        <!-- Galon Stats Section -->
        <div class="section listrik-stats" id="galonStatsSection" style="display: none;">
            <div style="text-align: center; margin-bottom: var(--space-md);">
                <div style="font-size: 0.75rem; color: var(--blue);">💧 GILIRAN GALON SELANJUTNYA</div>
                <div style="font-size: 1.125rem; font-weight: 700; margin-top: var(--space-xs);" id="nextGalonPayers">
                    -</div>
            </div>
            <div id="galonStatsList"
                style="margin-top: var(--space-md); padding-top: var(--space-md); border-top: 1px solid var(--border-color);">
            </div>
        </div>

        <div class="section" id="transactionSection">
            <div id="transactionList">
                <div class="empty-state">
                    <div class="spinner" style="margin: 0 auto;"></div>
                </div>
            </div>
        </div>

    </div>

    <!-- Receipt Modal -->
    <div class="modal-overlay" id="receiptModal">
        <div class="modal">
            <div class="modal-handle"></div>

    <script src="js/app.js"></script>
    <script>
        let currentCategory = '';
        let jastipHistoryOrders = [];

        function formatDateFull(dateStr) {
            const d = new Date(dateStr);
            return d.toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
        }

        (async () => {
            if (!await checkAuth()) { window.location.href = 'login.html'; return; }
            await Promise.all([loadUsers(), loadNotifications()]);
            await loadJastipHistory();
            await renderTransactions();
        })();

        async function renderTransactions(category = '') {
            const container = document.getElementById('transactionList');
            container.innerHTML = '<div class="empty-state"><div class="spinner" style="margin: 0 auto;"></div></div>';

            // Get filter values
            const searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();
            const fromDate = document.getElementById('fromDate').value;
            const toDate = document.getElementById('toDate').value;

            // Show/hide stats
            const listrikSection = document.getElementById('listrikStatsSection');
            const galonSection = document.getElementById('galonStatsSection');
            if (category === 'Listrik') {
                listrikSection.style.display = 'block';
                if(galonSection) galonSection.style.display = 'none';
                await loadListrikStats();
            } else if (category === 'Galon') {
                listrikSection.style.display = 'none';
                if(galonSection) galonSection.style.display = 'block';
                await loadGalonStats();
            } else {
                listrikSection.style.display = 'none';
                if(galonSection) galonSection.style.display = 'none';
            }

            try {
                const data = await loadExpenses(category || null);
                let expenses = data.expenses || [];
                if (category === 'Jastip') {
                    expenses = expenses.filter(e => e.category === 'Jastip');
                }
                const linkedJastipExpenseIds = new Set(
                    jastipHistoryOrders
                        .map(order => Number(order.expense_id || 0))
                        .filter(Boolean)
                );
                expenses = expenses.filter(e => !linkedJastipExpenseIds.has(Number(e.id)));

                // Apply search filter
                if (searchTerm) {
                    expenses = expenses.filter(e =>
                        e.description.toLowerCase().includes(searchTerm) ||
                        e.paid_by_name.toLowerCase().includes(searchTerm)
                    );
                }

                // Apply date filter
                if (fromDate) {
                    const from = new Date(fromDate);
                    expenses = expenses.filter(e => new Date(e.created_at) >= from);
                }
                if (toDate) {
                    const to = new Date(toDate);
                    to.setHours(23, 59, 59);
                    expenses = expenses.filter(e => new Date(e.created_at) <= to);
                }

                let rows = expenses.map(e => ({ type: 'expense', date: e.created_at, data: e }));
                if (category === '' || category === 'Jastip') {
                    rows = rows.concat(getFilteredJastipHistory().map(order => ({
                        type: 'jastip',
                        date: order.completed_at || order.closed_at || order.created_at,
                        data: order,
                    })));
                }
                rows.sort((a, b) => new Date(b.date) - new Date(a.date));

                if (rows.length === 0) {
                    container.innerHTML = '<div class="empty-state">Tidak ada transaksi ditemukan</div>';
                    return;
                }

                container.innerHTML = rows.map(row => (
                    row.type === 'jastip'
                        ? renderJastipAsTransaction(row.data)
                        : renderExpenseAsTransaction(row.data)
                )).join('');
            } catch { container.innerHTML = '<div class="empty-state">Gagal memuat</div>'; }
        }

        function clearFilters() {
            document.getElementById('searchInput').value = '';
            document.getElementById('fromDate').value = '';
            document.getElementById('toDate').value = '';
            renderTransactions(currentCategory);
        }

        async function loadJastipHistory() {
            try {
                const data = await apiGetFresh('jastip?limit=100');
                jastipHistoryOrders = (data.orders || []).filter(order => !['open', 'closed'].includes(order.status));
            } catch (err) {
                console.error(err);
            }
        }

        function getFilteredJastipHistory() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();
            const fromDate = document.getElementById('fromDate').value;
            const toDate = document.getElementById('toDate').value;
            let rows = [...jastipHistoryOrders];

            if (searchTerm) {
                rows = rows.filter(order =>
                    String(order.title || '').toLowerCase().includes(searchTerm) ||
                    String(order.opened_by_name || '').toLowerCase().includes(searchTerm) ||
                    (order.items || []).some(item => String(item.item_name || '').toLowerCase().includes(searchTerm))
                );
            }
            if (fromDate) {
                const from = new Date(fromDate);
                rows = rows.filter(order => new Date(order.completed_at || order.closed_at || order.created_at) >= from);
            }
            if (toDate) {
                const to = new Date(toDate);
                to.setHours(23, 59, 59);
                rows = rows.filter(order => new Date(order.completed_at || order.closed_at || order.created_at) <= to);
            }

            return rows;
        }

        function renderExpenseAsTransaction(e) {
            const isPayer = e.paid_by == state.user.id;
            const isSplit = e.splits.some(s => s.user_id == state.user.id);
            let tagClass = '', tagText = e.category;

            if (e.category === 'Listrik') {
                tagClass = '';
                tagText = 'Listrik';
            } else if (e.category === 'Jastip') {
                tagClass = 'piutang';
                tagText = 'Jastip';
            } else if (isPayer) {
                tagClass = 'piutang';
                tagText = 'Piutang';
            } else if (isSplit) {
                tagClass = 'hutang';
                tagText = 'Hutang';
            }

            return `
                <div class="transaction-item" onclick="showTransactionDetail(${safeJsonForAttr(e)})" style="cursor: pointer;">
                    <div class="transaction-info">
                        <div class="transaction-title">${escapeHtml(e.description)}</div>
                        <div class="transaction-meta">
                            <span class="transaction-tag ${tagClass}">${escapeHtml(tagText)}</span>
                            <span class="transaction-tag">${escapeHtml(e.paid_by_name)}</span>
                            <span class="transaction-tag">${formatDate(e.created_at)}</span>
                        </div>
                    </div>
                    <div style="text-align: right;">
                        <div class="transaction-amount ${tagClass}">Rp ${parseFloat(e.amount).toLocaleString('id-ID')}</div>
                        ${(e.paid_by == state.user.id || state.user.role === 'admin') ? `<button class="btn btn-danger" style="font-size: 0.625rem; padding: 4px 8px; margin-top: 8px;" onclick="event.stopPropagation(); handleDelete(${e.id})">Hapus</button>` : ''}
                    </div>
                </div>
            `;
        }

        function renderJastipAsTransaction(order) {
            const items = order.items || [];
            const total = items
                .filter(item => item.status === 'bought')
                .reduce((sum, item) => sum + Number(item.final_price || 0), 0);
            const date = order.completed_at || order.closed_at || order.created_at;
            return `
                <div class="transaction-item" onclick="showJastipDetail(${Number(order.id)})" style="cursor: pointer;">
                    <div class="transaction-info">
                        <div class="transaction-title">${escapeHtml(order.title)}</div>
                        <div class="transaction-meta">
                            <span class="transaction-tag piutang">Jastip</span>
                            <span class="transaction-tag">${escapeHtml(order.opened_by_name || '-')}</span>
                            <span class="transaction-tag">${formatDate(date)}</span>
                            <span class="transaction-tag">${jastipStatusLabel(order.status)}</span>
                        </div>
                    </div>
                    <div style="text-align: right;">
                        <div class="transaction-amount piutang">${total ? 'Rp ' + total.toLocaleString('id-ID') : '-'}</div>
                    </div>
                </div>
            `;
        }

        function showJastipDetail(orderId) {
            const order = jastipHistoryOrders.find(item => Number(item.id) === Number(orderId));
            if (!order) {
                showToast('Riwayat jastip tidak ditemukan', 'error');
                return;
            }
            const items = order.items || [];
            const total = items
                .filter(item => item.status === 'bought')
                .reduce((sum, item) => sum + Number(item.final_price || 0), 0);
            document.getElementById('jastipDetailContent').innerHTML = `
                <h3 class="modal-title">${escapeHtml(order.title)}</h3>
                <div class="jastip-detail-meta">Dibuka ${escapeHtml(order.opened_by_name || '-')} - ${formatDateFull(order.completed_at || order.closed_at || order.created_at)}</div>
                <div style="margin-top:10px;"><span class="jastip-pill ${order.status}">${jastipStatusLabel(order.status)}</span></div>
                ${order.note ? `<div class="jastip-detail-meta" style="margin-top:10px;">${escapeHtml(order.note)}</div>` : ''}
                <div class="jastip-detail-list">
                    ${items.length ? items.map(renderJastipDetailItem).join('') : '<div class="empty-state">Tidak ada item.</div>'}
                </div>
                <div class="jastip-detail-total">
                    <span>Total terbeli</span>
                    <span>Rp ${total.toLocaleString('id-ID')}</span>
                </div>
            `;
            openModal('jastipDetailModal');
        }

        function renderJastipDetailItem(item) {
            const price = Number(item.final_price || 0);
            const qty = item.final_qty || item.requested_qty || 1;
            return `
                <div class="jastip-detail-row">
                    <div>
                        <div class="jastip-detail-name">${escapeHtml(item.item_name)} <span class="jastip-detail-meta">x${qty}</span></div>
                        <div class="jastip-detail-meta">${escapeHtml(item.user_name || '-')}${item.note ? ' - ' + escapeHtml(item.note) : ''}</div>
                        ${item.final_note ? `<div class="jastip-detail-meta">Hasil: ${escapeHtml(item.final_note)}</div>` : ''}
                    </div>
                    <div style="font-weight:700;">${item.status === 'bought' ? 'Rp ' + price.toLocaleString('id-ID') : itemStatusLabel(item.status)}</div>
                </div>
            `;
        }

        function jastipStatusLabel(status) {
            return ({ completed: 'Selesai', cancelled: 'Batal', open: 'Open', closed: 'Ditutup' })[status] || status;
        }

        function itemStatusLabel(status) {
            return ({ requested: 'Belum dicek', bought: 'Ada', unavailable: 'Kosong', cancelled: 'Batal' })[status] || status;
        }

        // Event handlers for search and date filters
        document.getElementById('searchInput').addEventListener('input', () => renderTransactions(currentCategory));
        document.getElementById('fromDate').addEventListener('change', () => renderTransactions(currentCategory));
        document.getElementById('toDate').addEventListener('change', () => renderTransactions(currentCategory));

        async function loadListrikStats() {
            try {
                const res = await fetch(`${API_BASE}/listrik`, { credentials: 'include' });
                const data = await res.json();

                // Find minimum
                const minCount = Math.min(...data.stats.map(s => parseInt(s.payment_count)));
                const candidates = data.stats.filter(s => parseInt(s.payment_count) === minCount);

                // Display candidates
                if (candidates.length === 1) {
                    document.getElementById('nextListrikPayers').textContent = candidates[0].display_name;
                } else {
                    document.getElementById('nextListrikPayers').innerHTML = candidates.map(c =>
                        `<span style="display: inline-block; background: var(--bg-primary); padding: 2px 10px; border-radius: 12px; margin: 2px; font-size: 0.875rem;">${escapeHtml(c.display_name)}</span>`
                    ).join('');
                }

                // Stats list
                document.getElementById('listrikStatsList').innerHTML = data.stats.map((s, i) => {
                    const isCandidate = parseInt(s.payment_count) === minCount;
                    return `
                        <div style="display: flex; justify-content: space-between; padding: 8px 0; ${i < data.stats.length - 1 ? 'border-bottom: 1px solid rgba(0,0,0,0.1);' : ''}">
                            <span style="${isCandidate ? 'font-weight: 600;' : ''}">${escapeHtml(s.display_name)}</span>
                            <span style="font-weight: 600;">${s.payment_count}x</span>
                        </div>
                    `;
                }).join('');
            } catch (err) { console.error(err); }
        }

                async function loadGalonStats() {
            try {
                const res = await fetch(`${API_BASE}/galon`, { credentials: 'include' });
                const data = await res.json();

                // Find minimum
                const minCount = Math.min(...data.stats.map(s => parseInt(s.payment_count)));
                const candidates = data.stats.filter(s => parseInt(s.payment_count) === minCount);

                // Display candidates
                if (candidates.length === 1) {
                    document.getElementById('nextGalonPayers').textContent = candidates[0].display_name;
                } else {
                    document.getElementById('nextGalonPayers').innerHTML = candidates.map(c =>
                        `<span style="display: inline-block; background: var(--bg-primary); padding: 2px 10px; border-radius: 12px; margin: 2px; font-size: 0.875rem;">${escapeHtml(c.display_name)}</span>`
                    ).join('');
                }

                // Stats list
                document.getElementById('galonStatsList').innerHTML = data.stats.map((s, i) => {
                    const isCandidate = parseInt(s.payment_count) === minCount;
                    return `
                        <div style="display: flex; justify-content: space-between; padding: 8px 0; ${i < data.stats.length - 1 ? 'border-bottom: 1px solid rgba(0,0,0,0.1);' : ''}">
                            <span style="${isCandidate ? 'font-weight: 600;' : ''}">${escapeHtml(s.display_name)}</span>
                            <span style="font-weight: 600;">${s.payment_count} Galon</span>
                        </div>
                    `;
                }).join('');
            } catch (err) { console.error(err); }
        }

        function showTransactionDetail(tx) {
            const content = document.getElementById('transactionDetailContent');
            const isPayer = tx.paid_by == state.user.id;
            const canDelete = isPayer || state.user.role === 'admin';

            let splitInfo = '';
            if (tx.category === 'Listrik') {
                splitInfo = `<div class="text-muted" style="font-size: 0.875rem;">Sistem rotasi - tidak dibagi</div>`;
            } else if (tx.splits && tx.splits.length > 0) {
                splitInfo = `
                    <div style="margin-top: var(--space-md);">
                        <div class="text-muted" style="font-size: 0.75rem; margin-bottom: var(--space-sm);">DIBAGI KE:</div>
                        ${tx.splits.map(s => {
                    const userName = state.users.find(u => u.id == s.user_id)?.display_name || 'Unknown';
                    let itemsArr = [];
                    try {
                        let parsed = s.items;
                        while (typeof parsed === 'string') {
                            parsed = JSON.parse(parsed);
                        }
                        if (Array.isArray(parsed)) itemsArr = parsed;
                    } catch(e){}

                    return `
                                <div style="padding: var(--space-sm) 0; border-bottom: 1px solid var(--border-color);">
                                    <div style="display: flex; justify-content: space-between; cursor: pointer;" onclick="document.getElementById('items-${tx.id}-${s.user_id}').classList.toggle('hidden')">
                                        <span style="font-weight: 500;">${userName} ${itemsArr.length > 0 ? '<span style="font-size:0.7rem; color:var(--text-muted); margin-left:4px;">▼ detail</span>' : ''}</span>
                                        <span style="font-weight: 600;">Rp ${parseFloat(s.amount).toLocaleString('id-ID')}</span>
                                    </div>
                                    ${itemsArr.length > 0 ? 
                                        `<div id="items-${tx.id}-${s.user_id}" class="hidden" style="margin-top: 8px; padding: 8px; background: rgba(0,0,0,0.03); border-radius: 4px; font-size: 0.75rem;">
                                            ${itemsArr.map(i => `
                                                <div style="display: flex; justify-content: space-between; margin-bottom: 4px;">
                                                    <span style="color: var(--text-muted); flex:1; padding-right:8px;">${escapeHtml(String(i.item || 'Item')).toUpperCase()}${i.qty ? ` <span style="font-size:0.7rem;">x${escapeHtml(i.qty)}</span>` : ''}</span>
                                                    <span style="font-weight: 500;">Rp ${Number(i.price || 0).toLocaleString('id-ID')}</span>
                                                </div>
                                            `).join('')}
                                        </div>` 
                                    : ''}
                                </div>
                            `;
                }).join('')}
                    </div>
                `;
            }

            content.innerHTML = `
                ${tx.receipt_image ? `<img src="${imageUrl(tx.receipt_image)}" class="info-detail-image" alt="Bukti">` : ''}
                <h2 style="margin-bottom: var(--space-sm);">${tx.description}</h2>
                <div style="font-size: 1.5rem; font-weight: 700; color: ${tx.category === 'Listrik' ? 'var(--text-primary)' : (isPayer ? 'var(--green)' : 'var(--red)')}; margin-bottom: var(--space-md);">
                    Rp ${parseFloat(tx.amount).toLocaleString('id-ID')}
                </div>
                <div class="info-detail-meta">
                    <div><strong>Kategori:</strong> ${tx.category}</div>
                    <div><strong>Dibayar oleh:</strong> ${tx.paid_by_name}</div>
                    <div><strong>Tanggal:</strong> ${formatDateFull(tx.created_at)}</div>
                </div>
                ${splitInfo}
                ${canDelete ? `<button class="btn btn-danger btn-full mt-md" onclick="handleDelete(${tx.id}); closeModal('transactionDetailModal');">Hapus</button>` : ''}
            `;
            openModal('transactionDetailModal');
        }

        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentCategory = btn.dataset.category;
                renderTransactions(currentCategory);
            });
        });

        function showReceipt(path) {
            document.getElementById('modalReceiptImage').src = imageUrl(path);
            openModal('receiptModal');
        }

        async function handleDelete(id) {
            if (!confirm('Hapus transaksi?')) return;
            try {
                await deleteExpense(id);
                showToast('Dihapus', 'success');
                renderTransactions(currentCategory);
            } catch (err) { showToast('Gagal', 'error'); }
        }

        ['receiptModal', 'transactionDetailModal', 'jastipDetailModal'].forEach(id => {
            document.getElementById(id).addEventListener('click', (e) => {
                if (e.target.classList.contains('modal-overlay')) closeModal(id);
            });
        });
    </script>
</body>

</html>
