<!DOCTYPE html>
<html lang="id">

<head>
    <script>
        // Set theme ASAP to prevent white flash
        (function(){var t=localStorage.getItem('theme');if(t)document.documentElement.setAttribute('data-theme',t);else if(window.matchMedia('(prefers-color-scheme: dark)').matches)document.documentElement.setAttribute('data-theme','dark');})();
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="theme-color" content="#f5f5f7">

    <link rel="manifest" href="manifest.json">

    <style>
        body { animation: pageFadeIn 0.15s ease; }
        @keyframes pageFadeIn { from { opacity: 0; } to { opacity: 1; } }
        .sticky-header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--bg-primary);
            padding-top: var(--space-md);
            padding-bottom: var(--space-sm);
        }

        .search-filter {
            display: flex;
            gap: var(--space-sm);
            margin-bottom: var(--space-md);
        }

        .hidden-filter-inputs {
            display: none;
        }

        .search-input {
            flex: 1;
            padding: var(--space-sm) var(--space-md);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-full);
            background: var(--bg-card);
            color: var(--text-primary);
            font-size: 0.875rem;
            font-family: inherit;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--text-primary);
        }

        .filter-pill-row {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: var(--space-sm);
            padding: 2px 0 var(--space-sm);
        }

        .filter-pill {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: var(--space-sm);
            min-height: 42px;
            min-width: 0;
            padding: 9px 12px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-full);
            background: var(--bg-card);
            color: var(--text-primary);
            font-size: 0.875rem;
            font-weight: 700;
            font-family: inherit;
            line-height: 1;
        }

        .filter-pill span {
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .filter-pill::after {
            content: '';
            width: 7px;
            height: 7px;
            border-right: 2px solid currentColor;
            border-bottom: 2px solid currentColor;
            transform: rotate(45deg) translateY(-2px);
            opacity: 0.75;
            flex: 0 0 auto;
        }

        .filter-pill.active-filter {
            border-color: var(--green);
            color: var(--green);
            background: var(--green-light);
        }

        .filter-sheet {
            max-height: min(82vh, 680px);
            padding-bottom: calc(var(--space-lg) + env(safe-area-inset-bottom));
            border-radius: 24px 24px 0 0;
        }

        .sheet-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: var(--space-md);
            margin-bottom: var(--space-lg);
        }

        .sheet-title {
            font-size: 1.45rem;
            font-weight: 900;
            line-height: 1.1;
        }

        .sheet-clear {
            border: 1px solid var(--border-color);
            border-radius: var(--radius-full);
            padding: 9px 16px;
            background: transparent;
            color: var(--text-muted);
            font-weight: 800;
            font-family: inherit;
        }

        .sheet-list {
            display: grid;
            gap: 0;
        }

        .sheet-option {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: var(--space-md);
            align-items: center;
            min-height: 72px;
            border-bottom: 1px solid var(--border-color);
            background: transparent;
            color: var(--text-primary);
            text-align: left;
            font-family: inherit;
        }

        .sheet-option-title {
            font-size: 1rem;
            font-weight: 900;
        }

        .sheet-option-subtitle {
            margin-top: 4px;
            color: var(--text-muted);
            font-size: 0.86rem;
        }

        .sheet-radio {
            width: 24px;
            height: 24px;
            border: 2px solid var(--text-muted);
            border-radius: 50%;
        }

        .sheet-option.active .sheet-radio {
            border-color: var(--green);
            box-shadow: inset 0 0 0 6px var(--bg-card);
            background: var(--green);
        }

        .sheet-date-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: var(--space-sm);
            margin: var(--space-md) 0 var(--space-lg);
        }

        .sheet-date-field {
            display: grid;
            gap: 7px;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            background: var(--bg-card);
        }

        .sheet-date-field span {
            color: var(--text-muted);
            font-size: 0.72rem;
            font-weight: 800;
        }

        .sheet-date-field input,
        .sheet-search-input {
            width: 100%;
            border: 0;
            outline: 0;
            background: transparent;
            color: var(--text-primary);
            font: inherit;
            font-weight: 800;
        }

        .sheet-category-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: var(--space-lg) var(--space-md);
            margin-bottom: var(--space-lg);
        }

        .sheet-category {
            display: grid;
            gap: 8px;
            justify-items: center;
            border: 0;
            background: transparent;
            color: var(--text-primary);
            font-family: inherit;
            text-align: center;
            min-width: 0;
        }

        .sheet-category-icon {
            display: grid;
            place-items: center;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: rgba(34, 197, 94, 0.14);
            color: var(--green);
            font-weight: 900;
        }

        .sheet-category.active .sheet-category-icon {
            background: var(--green);
            color: white;
        }

        .sheet-category span:last-child {
            font-weight: 700;
            line-height: 1.2;
            overflow-wrap: anywhere;
        }

        .sheet-search-box {
            padding: 14px 16px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            background: var(--bg-card);
            margin-bottom: var(--space-lg);
        }

        .sheet-apply {
            width: 100%;
            min-height: 48px;
            border-radius: var(--radius-full);
            background: var(--green);
            color: white;
            border: 0;
            font: inherit;
            font-weight: 900;
        }

        .filter-scroll {
            display: flex;
            gap: 8px;
            margin-bottom: var(--space-sm);
            overflow-x: auto;
            padding: 0 2px var(--space-xs);
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }

        .filter-scroll::-webkit-scrollbar {
            display: none;
        }

        .filter-scroll .filter-btn {
            flex: 0 0 auto;
            min-width: max-content;
            min-height: 40px;
            padding: 9px 12px;
            border-radius: var(--radius-full);
            line-height: 1;
        }

        .jastip-detail-meta {
            color: var(--text-muted);
            font-size: 0.75rem;
            margin-top: 4px;
            line-height: 1.35;
        }

        .jastip-pill {
            display: inline-flex;
            align-items: center;
            border-radius: var(--radius-full);
            padding: 4px 9px;
            font-size: 0.68rem;
            font-weight: 800;
            white-space: nowrap;
            background: var(--bg-secondary);
            color: var(--text-muted);
        }

        .jastip-pill.completed { color: #3b82f6; background: rgba(59, 130, 246, 0.14); }
        .jastip-pill.cancelled { color: var(--red); background: var(--red-medium); }

        .jastip-detail-list {
            display: grid;
            gap: 8px;
            margin-top: var(--space-md);
        }

        .jastip-detail-row {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: var(--space-sm);
            padding: 10px 0;
            border-bottom: 1px solid var(--border-color);
        }

        .jastip-detail-row:last-child {
            border-bottom: 0;
        }

        .jastip-detail-name {
            color: var(--text-primary);
            font-weight: 700;
            overflow-wrap: anywhere;
        }

        .jastip-detail-total {
            display: flex;
            justify-content: space-between;
            gap: var(--space-sm);
            padding-top: var(--space-md);
            font-weight: 800;
        }

        @media (max-width: 380px) {
            .filter-pill-row {
                gap: 6px;
            }

            .filter-pill {
                padding: 8px 9px;
                font-size: 0.78rem;
            }
        }
    </style>

</head>

    <script>
        let currentCategory = '';
        let jastipHistoryOrders = [];
        let currentHistoryRows = [];
        const historyCategories = [
            { value: '', label: 'Semua', icon: 'All' },
            { value: 'Listrik', label: 'Listrik', icon: 'L' },
            { value: 'Galon', label: 'Galon', icon: 'G' },
            { value: 'Air', label: 'Air', icon: 'A' },
            { value: 'Keamanan & Kebersihan', label: 'Keamanan', icon: 'K' },
            { value: 'Titip Makanan', label: 'Makanan', icon: 'M' },
            { value: 'Jastip', label: 'Jastip', icon: 'J' }
        ];

        function formatDateFull(dateStr) {
            const d = new Date(dateStr);
            return d.toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
        }

        function formatDateCompact(dateStr) {
            if (!dateStr) return '';
            return new Date(dateStr).toLocaleDateString('id-ID', { day: 'numeric', month: 'short' });
        }

        (async () => {
            if (!await checkAuth()) { window.location.href = 'login.html'; return; }
            renderCategorySheet();
            updateFilterChips();
            await Promise.all([loadUsers(), loadNotifications()]);
            await loadJastipHistory();
            await renderTransactions();
        })();

        async function renderTransactions(category = '') {
            currentCategory = category;
            updateFilterChips();
            const container = document.getElementById('transactionList');
            container.innerHTML = renderSkeletonList(3);

            // Get filter values
            const searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();
            const fromDate = document.getElementById('fromDate').value;
            const toDate = document.getElementById('toDate').value;

            // Show/hide stats
            const listrikSection = document.getElementById('listrikStatsSection');
            const galonSection = document.getElementById('galonStatsSection');
            if (category === 'Listrik') {
                listrikSection.style.display = 'block';
                if(galonSection) galonSection.style.display = 'none';
                await loadListrikStats();
            } else if (category === 'Galon') {
                listrikSection.style.display = 'none';
                if(galonSection) galonSection.style.display = 'block';
                await loadGalonStats();
            } else {
                listrikSection.style.display = 'none';
                if(galonSection) galonSection.style.display = 'none';
            }

            try {
                const data = await loadExpenses(category || null);
                let expenses = data.expenses || [];
                if (category === 'Jastip') {
                    expenses = expenses.filter(e => e.category === 'Jastip');
                }
                const linkedJastipExpenseIds = new Set(
                    jastipHistoryOrders
                        .map(order => Number(order.expense_id || 0))
                        .filter(Boolean)
                );
                expenses = expenses.filter(e => !linkedJastipExpenseIds.has(Number(e.id)));

                // Apply search filter
                if (searchTerm) {
                    expenses = expenses.filter(e =>
                        e.description.toLowerCase().includes(searchTerm) ||
                        e.paid_by_name.toLowerCase().includes(searchTerm)
                    );
                }

                // Apply date filter
                if (fromDate) {
                    const from = new Date(fromDate);
                    expenses = expenses.filter(e => new Date(e.created_at) >= from);
                }
                if (toDate) {
                    const to = new Date(toDate);
                    to.setHours(23, 59, 59);
                    expenses = expenses.filter(e => new Date(e.created_at) <= to);
                }

                let rows = expenses.map(e => ({ type: 'expense', date: e.created_at, data: e }));
                if (category === '' || category === 'Jastip') {
                    rows = rows.concat(getFilteredJastipHistory().map(order => ({
                        type: 'jastip',
                        date: order.completed_at || order.closed_at || order.created_at,
                        data: order,
                    })));
                }
                rows.sort((a, b) => new Date(b.date) - new Date(a.date));
                currentHistoryRows = rows;

                if (rows.length === 0) {
                    container.innerHTML = renderEmptyState({
                        title: 'Tidak ada transaksi',
                        body: 'Coba ubah filter, tanggal, atau kata pencarian.'
                    });
                    return;
                }

                container.innerHTML = rows.map(row => (
                    row.type === 'jastip'
                        ? renderJastipAsTransaction(row.data)
                        : renderExpenseAsTransaction(row.data)
                )).join('');
            } catch {
                currentHistoryRows = [];
                container.innerHTML = renderEmptyState({
                    title: 'Gagal memuat riwayat',
                    body: 'Koneksi atau server sedang bermasalah.',
                    action: 'renderTransactions(currentCategory)',
                    actionText: 'Coba Lagi'
                });
            }
        }

        function clearFilters() {
            document.getElementById('searchInput').value = '';
            document.getElementById('fromDate').value = '';
            document.getElementById('toDate').value = '';
            currentCategory = '';
            renderTransactions('');
        }

        function updateFilterChips() {
            const fromDate = document.getElementById('fromDate')?.value || '';
            const toDate = document.getElementById('toDate')?.value || '';
            const searchTerm = document.getElementById('searchInput')?.value.trim() || '';
            const category = historyCategories.find(item => item.value === currentCategory);

            setFilterChip('dateFilterChip', fromDate || toDate
                ? `${fromDate ? formatDateCompact(fromDate) : 'Awal'} - ${toDate ? formatDateCompact(toDate) : 'Kini'}`
                : 'Tanggal', Boolean(fromDate || toDate));
            setFilterChip('categoryFilterChip', category && category.value ? category.label : 'Kategori', Boolean(category && category.value));
            setFilterChip('searchFilterChip', searchTerm ? trimText(searchTerm, 12) : 'Cari', Boolean(searchTerm));
            updateDatePresetState();
            updateCategorySheetState();
        }

        function setFilterChip(id, label, active) {
            const chip = document.getElementById(id);
            if (!chip) return;
            chip.querySelector('span').textContent = label;
            chip.classList.toggle('active-filter', active);
        }

        function openDateFilterSheet() {
            document.getElementById('sheetFromDate').value = document.getElementById('fromDate').value;
            document.getElementById('sheetToDate').value = document.getElementById('toDate').value;
            updateDatePresetLabels();
            updateDatePresetState();
            openModal('dateFilterModal');
        }

        function openCategoryFilterSheet() {
            updateCategorySheetState();
            openModal('categoryFilterModal');
        }

        function openSearchFilterSheet() {
            const input = document.getElementById('sheetSearchInput');
            input.value = document.getElementById('searchInput').value;
            openModal('searchFilterModal');
            setTimeout(() => input.focus(), 120);
        }

        function applyDatePreset(days) {
            const to = new Date();
            const from = new Date();
            from.setDate(to.getDate() - (days - 1));
            document.getElementById('fromDate').value = dateInputValue(from);
            document.getElementById('toDate').value = dateInputValue(to);
            closeModal('dateFilterModal');
            renderTransactions(currentCategory);
        }

        function applyCustomDateFilter() {
            document.getElementById('fromDate').value = document.getElementById('sheetFromDate').value;
            document.getElementById('toDate').value = document.getElementById('sheetToDate').value;
            closeModal('dateFilterModal');
            renderTransactions(currentCategory);
        }

        function clearDateFilterOnly() {
            document.getElementById('fromDate').value = '';
            document.getElementById('toDate').value = '';
            document.getElementById('sheetFromDate').value = '';
            document.getElementById('sheetToDate').value = '';
            closeModal('dateFilterModal');
            renderTransactions(currentCategory);
        }

        function applyCategoryFilter(category) {
            currentCategory = category;
            closeModal('categoryFilterModal');
            renderTransactions(currentCategory);
        }

        function applySearchFilter() {
            document.getElementById('searchInput').value = document.getElementById('sheetSearchInput').value.trim();
            closeModal('searchFilterModal');
            renderTransactions(currentCategory);
        }

        function clearSearchFilter() {
            document.getElementById('searchInput').value = '';
            document.getElementById('sheetSearchInput').value = '';
            closeModal('searchFilterModal');
            renderTransactions(currentCategory);
        }

        function renderCategorySheet() {
            document.getElementById('categorySheetGrid').innerHTML = historyCategories.map(item => `
                <button class="sheet-category" type="button" data-category-value="${escapeAttribute(item.value)}" onclick="applyCategoryFilter('${escapeAttribute(item.value)}')">
                    <span class="sheet-category-icon">${escapeHtml(item.icon)}</span>
                    <span>${escapeHtml(item.label)}</span>
                </button>
            `).join('');
            updateCategorySheetState();
        }

        function updateCategorySheetState() {
            document.querySelectorAll('.sheet-category').forEach(button => {
                button.classList.toggle('active', button.dataset.categoryValue === currentCategory);
            });
        }

        function updateDatePresetLabels() {
            [7, 30, 90].forEach(days => {
                const to = new Date();
                const from = new Date();
                from.setDate(to.getDate() - (days - 1));
                const el = document.getElementById(`datePreset${days}`);
                if (el) el.textContent = `${formatDateFull(from)} - ${formatDateFull(to)}`;
            });
        }

        function updateDatePresetState() {
            const fromDate = document.getElementById('fromDate')?.value || '';
            const toDate = document.getElementById('toDate')?.value || '';
            document.querySelectorAll('[data-date-preset]').forEach(button => {
                const days = Number(button.dataset.datePreset);
                const to = new Date();
                const from = new Date();
                from.setDate(to.getDate() - (days - 1));
                button.classList.toggle('active', fromDate === dateInputValue(from) && toDate === dateInputValue(to));
            });
        }

        function dateInputValue(date) {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        function trimText(value, maxLength) {
            const text = String(value || '').trim();
            return text.length > maxLength ? `${text.slice(0, maxLength - 1)}...` : text;
        }

        async function loadJastipHistory() {
            try {
                const data = await apiGetFresh('jastip?limit=100');
                jastipHistoryOrders = (data.orders || []).filter(order => !['open', 'closed'].includes(order.status));
            } catch (err) {
                console.error(err);
            }
        }

        function getFilteredJastipHistory() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();
            const fromDate = document.getElementById('fromDate').value;
            const toDate = document.getElementById('toDate').value;
            let rows = [...jastipHistoryOrders];

            if (searchTerm) {
                rows = rows.filter(order =>
                    String(order.title || '').toLowerCase().includes(searchTerm) ||
                    String(order.opened_by_name || '').toLowerCase().includes(searchTerm) ||
                    (order.items || []).some(item => String(item.item_name || '').toLowerCase().includes(searchTerm))
                );
            }
            if (fromDate) {
                const from = new Date(fromDate);
                rows = rows.filter(order => new Date(order.completed_at || order.closed_at || order.created_at) >= from);
            }
            if (toDate) {
                const to = new Date(toDate);
                to.setHours(23, 59, 59);
                rows = rows.filter(order => new Date(order.completed_at || order.closed_at || order.created_at) <= to);
            }

            return rows;
        }

        function renderExpenseAsTransaction(e) {
            const isPayer = e.paid_by == state.user.id;
            const isSplit = e.splits.some(s => s.user_id == state.user.id);
            let tagClass = '', tagText = e.category;

            if (e.category === 'Listrik') {
                tagClass = '';
                tagText = 'Listrik';
            } else if (e.category === 'Jastip') {
                tagClass = 'piutang';
                tagText = 'Jastip';
            } else if (isPayer) {
                tagClass = 'piutang';
                tagText = 'Piutang';
            } else if (isSplit) {
                tagClass = 'hutang';
                tagText = 'Hutang';
            }

            return `
                <div class="transaction-item" onclick="showTransactionDetail(${safeJsonForAttr(e)})" style="cursor: pointer;">
                    <div class="transaction-info">
                        <div class="transaction-title">${escapeHtml(e.description)}</div>
                        <div class="transaction-meta">
                            <span class="transaction-tag ${tagClass}">${escapeHtml(tagText)}</span>
                            <span class="transaction-tag">${escapeHtml(e.paid_by_name)}</span>
                            <span class="transaction-tag">${formatDate(e.created_at)}</span>
                        </div>
                    </div>
                    <div style="text-align: right;">
                        <div class="transaction-amount ${tagClass}">Rp ${parseFloat(e.amount).toLocaleString('id-ID')}</div>
                        ${(e.paid_by == state.user.id || state.user.role === 'admin') ? `<button class="btn btn-danger" style="font-size: 0.625rem; padding: 4px 8px; margin-top: 8px;" onclick="event.stopPropagation(); handleDelete(${e.id})">Hapus</button>` : ''}
                    </div>
                </div>
            `;
        }

        function renderJastipAsTransaction(order) {
            const items = order.items || [];
            const total = items
                .filter(item => item.status === 'bought')
                .reduce((sum, item) => sum + Number(item.final_price || 0), 0);
            const date = order.completed_at || order.closed_at || order.created_at;
            return `
                <div class="transaction-item" onclick="showJastipDetail(${Number(order.id)})" style="cursor: pointer;">
                    <div class="transaction-info">
                        <div class="transaction-title">${escapeHtml(order.title)}</div>
                        <div class="transaction-meta">
                            <span class="transaction-tag piutang">Jastip</span>
                            <span class="transaction-tag">${escapeHtml(order.opened_by_name || '-')}</span>
                            <span class="transaction-tag">${formatDate(date)}</span>
                            <span class="transaction-tag">${jastipStatusLabel(order.status)}</span>
                        </div>
                    </div>
                    <div style="text-align: right;">
                        <div class="transaction-amount piutang">${total ? 'Rp ' + total.toLocaleString('id-ID') : '-'}</div>
                    </div>
                </div>
            `;
        }

        function showJastipDetail(orderId) {
            const order = jastipHistoryOrders.find(item => Number(item.id) === Number(orderId));
            if (!order) {
                showToast('Riwayat jastip tidak ditemukan', 'error');
                return;
            }
            const items = order.items || [];
            const total = items
                .filter(item => item.status === 'bought')
                .reduce((sum, item) => sum + Number(item.final_price || 0), 0);
            document.getElementById('jastipDetailContent').innerHTML = `
                <h3 class="modal-title">${escapeHtml(order.title)}</h3>
                <div class="jastip-detail-meta">Dibuka ${escapeHtml(order.opened_by_name || '-')} - ${formatDateFull(order.completed_at || order.closed_at || order.created_at)}</div>
                <div style="margin-top:10px;"><span class="jastip-pill ${order.status}">${jastipStatusLabel(order.status)}</span></div>
                ${order.note ? `<div class="jastip-detail-meta" style="margin-top:10px;">${escapeHtml(order.note)}</div>` : ''}
                <div class="jastip-detail-list">
                    ${items.length ? items.map(renderJastipDetailItem).join('') : '<div class="empty-state">Tidak ada item.</div>'}
                </div>
                <div class="jastip-detail-total">
                    <span>Total terbeli</span>
                    <span>Rp ${total.toLocaleString('id-ID')}</span>
                </div>
            `;
            openModal('jastipDetailModal');
        }

        function renderJastipDetailItem(item) {
            const price = Number(item.final_price || 0);
            const qty = item.final_qty || item.requested_qty || 1;
            return `
                <div class="jastip-detail-row">
                    <div>
                        <div class="jastip-detail-name">${escapeHtml(item.item_name)} <span class="jastip-detail-meta">x${qty}</span></div>
                        <div class="jastip-detail-meta">${escapeHtml(item.user_name || '-')}${item.note ? ' - ' + escapeHtml(item.note) : ''}</div>
                        ${item.final_note ? `<div class="jastip-detail-meta">Hasil: ${escapeHtml(item.final_note)}</div>` : ''}
                    </div>
                    <div style="font-weight:700;">${item.status === 'bought' ? 'Rp ' + price.toLocaleString('id-ID') : itemStatusLabel(item.status)}</div>
                </div>
            `;
        }

        function jastipStatusLabel(status) {
            return ({ completed: 'Selesai', cancelled: 'Batal', open: 'Open', closed: 'Ditutup' })[status] || status;
        }

        function itemStatusLabel(status) {
            return ({ requested: 'Belum dicek', bought: 'Ada', unavailable: 'Kosong', cancelled: 'Batal' })[status] || status;
        }

        document.getElementById('sheetSearchInput').addEventListener('keydown', event => {
            if (event.key === 'Enter') applySearchFilter();
        });

        async function loadListrikStats() {
            try {
                const res = await fetch(`${API_BASE}/listrik`, { credentials: 'include' });
                const data = await res.json();

                // Find minimum
                const minCount = Math.min(...data.stats.map(s => parseInt(s.payment_count)));
                const candidates = data.stats.filter(s => parseInt(s.payment_count) === minCount);

                // Display candidates
                if (candidates.length === 1) {
                    document.getElementById('nextListrikPayers').textContent = candidates[0].display_name;
                } else {
                    document.getElementById('nextListrikPayers').innerHTML = candidates.map(c =>
                        `<span style="display: inline-block; background: var(--bg-primary); padding: 2px 10px; border-radius: 12px; margin: 2px; font-size: 0.875rem;">${escapeHtml(c.display_name)}</span>`
                    ).join('');
                }

                // Stats list
                document.getElementById('listrikStatsList').innerHTML = data.stats.map((s, i) => {
                    const isCandidate = parseInt(s.payment_count) === minCount;
                    return `
                        <div style="display: flex; justify-content: space-between; padding: 8px 0; ${i < data.stats.length - 1 ? 'border-bottom: 1px solid rgba(0,0,0,0.1);' : ''}">
                            <span style="${isCandidate ? 'font-weight: 600;' : ''}">${escapeHtml(s.display_name)}</span>
                            <span style="font-weight: 600;">${s.payment_count}x</span>
                        </div>
                    `;
                }).join('');
            } catch (err) { console.error(err); }
        }

                async function loadGalonStats() {
            try {
                const res = await fetch(`${API_BASE}/galon`, { credentials: 'include' });
                const data = await res.json();

                // Find minimum
                const minCount = Math.min(...data.stats.map(s => parseInt(s.payment_count)));
                const candidates = data.stats.filter(s => parseInt(s.payment_count) === minCount);

                // Display candidates
                if (candidates.length === 1) {
                    document.getElementById('nextGalonPayers').textContent = candidates[0].display_name;
                } else {
                    document.getElementById('nextGalonPayers').innerHTML = candidates.map(c =>
                        `<span style="display: inline-block; background: var(--bg-primary); padding: 2px 10px; border-radius: 12px; margin: 2px; font-size: 0.875rem;">${escapeHtml(c.display_name)}</span>`
                    ).join('');
                }

                // Stats list
                document.getElementById('galonStatsList').innerHTML = data.stats.map((s, i) => {
                    const isCandidate = parseInt(s.payment_count) === minCount;
                    return `
                        <div style="display: flex; justify-content: space-between; padding: 8px 0; ${i < data.stats.length - 1 ? 'border-bottom: 1px solid rgba(0,0,0,0.1);' : ''}">
                            <span style="${isCandidate ? 'font-weight: 600;' : ''}">${escapeHtml(s.display_name)}</span>
                            <span style="font-weight: 600;">${s.payment_count} Galon</span>
                        </div>
                    `;
                }).join('');
            } catch (err) { console.error(err); }
        }

        function showTransactionDetail(tx) {
            const content = document.getElementById('transactionDetailContent');
            const isPayer = tx.paid_by == state.user.id;
            const canDelete = isPayer || state.user.role === 'admin';
            content.innerHTML = renderTransactionDetailContent(tx, {
                canDelete,
                deleteAction: `handleDelete(${Number(tx.id)}); closeModal('transactionDetailModal');`
            });
            openModal('transactionDetailModal');
        }

        function showReceipt(path) {
            document.getElementById('modalReceiptImage').src = imageUrl(path);
            openModal('receiptModal');
        }

        async function handleDelete(id) {
            if (!confirm('Hapus transaksi?')) return;
            try {
                await deleteExpense(id);
                showToast('Dihapus', 'success');
                renderTransactions(currentCategory);
            } catch (err) { showToast('Gagal', 'error'); }
        }

        ['receiptModal', 'transactionDetailModal', 'jastipDetailModal', 'dateFilterModal', 'categoryFilterModal', 'searchFilterModal'].forEach(id => {
            document.getElementById(id).addEventListener('click', (e) => {
                if (e.target.classList.contains('modal-overlay')) closeModal(id);
            });
        });
    </script>
</body>
