<!DOCTYPE html>
<html lang="id">

<head>
    <script>
        // Set theme ASAP to prevent white flash
        (function(){var t=localStorage.getItem('theme');if(t)document.documentElement.setAttribute('data-theme',t);else if(window.matchMedia('(prefers-color-scheme: dark)').matches)document.documentElement.setAttribute('data-theme','dark');})();
    
        let aiItems = [];
        let aiGrandTotal = 0; // Total yang dibayarkan di struk (setelah pajak/diskon)

        async function scanReceiptWithAI() {
            if (!uploadedFilePath) { showToast('Upload struk dulu', 'error'); return; }
            
            const btn = document.getElementById('btnAIOcr');
            const originalText = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<div class="spinner" style="width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white;"></div> <span style="margin-left: 8px;">Membaca struk...</span>';

            try {
                // Ensure full URL for Cloudinary if it's relative
                const imgUrl = imageUrl(uploadedFilePath);
                const absoluteUrl = imgUrl.startsWith('http') ? imgUrl : window.location.origin + imgUrl;

                const res = await apiPost('expenses?action=ocr', { url: absoluteUrl });
                if (res && res.items && res.items.length > 0) {
                    aiItems = res.items.map(i => ({ ...i, assignedTo: [] }));
                    aiGrandTotal = res.grand_total || aiItems.reduce((s,i) => s + i.price, 0);
                    
                    isAiMode = true;
                    document.getElementById('aiItemsSection').classList.remove('hidden');
                    
                    // Modify UI for GoPay Flow
                    document.getElementById('amount').parentElement.classList.add('hidden');
                    document.getElementById('btnSplitEqual').parentElement.parentElement.classList.add('hidden');
                    
                    // Change label of userGrid to instruct selection
                    const userGridLabel = document.getElementById('userGrid').previousElementSibling;
                    if (userGridLabel) userGridLabel.textContent = 'Pilih Anggota yang Ikut Split';
                    
                    // Move userGrid just above AI Items list
                    const userGridGroup = document.getElementById('userGrid').parentElement;
                    const aiItemsSection = document.getElementById('aiItemsSection');
                    aiItemsSection.parentNode.insertBefore(userGridGroup, aiItemsSection);

                    // Show AI Grand Total info
                    let infoDiv = document.getElementById('aiSummaryInfo');
                    if(!infoDiv) {
                        infoDiv = document.createElement('div');
                        infoDiv.id = 'aiSummaryInfo';
                        infoDiv.style.cssText = 'background: rgba(var(--primary-rgb), 0.1); border: 1px solid var(--primary); padding: 12px; border-radius: var(--radius-md); margin-bottom: 16px; font-size: 0.85rem;';
                        aiItemsSection.insertBefore(infoDiv, document.getElementById('aiItemsList'));
                    }
                    const sumItems = aiItems.reduce((s,i)=>s+i.price,0);
                    const selisih = aiGrandTotal - sumItems;
                    let textInfo = `<div style="display:flex; justify-content:space-between; margin-bottom:4px;"><span>Total Item:</span> <b>Rp ${sumItems.toLocaleString('id-ID')}</b></div>`;
                    if (selisih !== 0) {
                        textInfo += `<div style="display:flex; justify-content:space-between; margin-bottom:4px; color: ${selisih < 0 ? 'var(--red)' : 'var(--text-color)'};"><span>Pajak/Diskon:</span> <b>${selisih > 0 ? '+' : ''}Rp ${selisih.toLocaleString('id-ID')}</b></div>`;
                    }
                    textInfo += `<div style="display:flex; justify-content:space-between; margin-top:8px; padding-top:8px; border-top:1px dashed var(--border-color); font-size:1rem; font-weight:700;"><span>Total Tagihan:</span> <span>Rp ${aiGrandTotal.toLocaleString('id-ID')}</span></div>`;
                    infoDiv.innerHTML = textInfo;

                    // Switch to custom
                    splitMode = 'custom';
                    document.querySelectorAll('.user-amount').forEach(el => el.classList.remove('hidden'));
                    
                    renderAIItems();
                    showToast('Struk berhasil dibaca!', 'success');
                } else {
                    showToast('Tidak ada item terdeteksi di struk', 'error');
                }
            } catch (err) {
                console.error(err);
                showToast('Gagal scan struk. Pastikan API key dikonfigurasi.', 'error');
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }

        function renderAIItems() {
            const container = document.getElementById('aiItemsList');
            
            const selectedMembers = [];
            document.querySelectorAll('.user-checkbox input:checked').forEach(input => {
                const userId = parseInt(input.value);
                const user = state.users.find(u => u.id === userId);
                if(user) selectedMembers.push(user);
            });

            if(selectedMembers.length === 0) {
                container.innerHTML = '<div class="empty-state" style="padding: 20px;">Pilih anggota yang ikut di atas ⬆️</div>';
                calculateAITotals();
                return;
            }

            container.innerHTML = aiItems.map((item, index) => `
                <div style="background: var(--bg-card); border: 1px solid var(--border-color); border-radius: var(--radius-md); padding: 16px; box-shadow: var(--shadow-sm); margin-bottom: 12px;">
                    <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px;">
                        <span style="font-weight: 600; line-height: 1.3; padding-right: 12px;">${item.item}</span>
                        <span style="font-weight: 700; white-space: nowrap;">Rp ${item.price.toLocaleString('id-ID')}</span>
                    </div>
                    <div style="font-size: 0.75rem; color: var(--text-muted); margin-bottom: 8px;">Dibayar oleh:</div>
                    <div style="display: flex; flex-wrap: wrap; gap: 8px;">
                        ${selectedMembers.map(u => {
                            const isSelected = item.assignedTo.includes(u.id);
                            return `<div onclick="toggleAIAssign(${index}, ${u.id})" 
                                          style="display: flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 20px; cursor: pointer; transition: all 0.2s;
                                                 ${isSelected ? 'background: var(--primary); color: white; border: 1px solid var(--primary);' : 'background: transparent; color: var(--text-muted); border: 1px solid var(--border-color);'}">
                                        <div style="width: 20px; height: 20px; border-radius: 50%; background: ${isSelected ? 'rgba(255,255,255,0.2)' : 'var(--bg-secondary)'}; display: flex; align-items: center; justify-content: center; font-size: 0.65rem; font-weight: bold;">
                                            ${u.display_name.charAt(0).toUpperCase()}
                                        </div>
                                        <span style="font-size: 0.75rem; font-weight: ${isSelected ? '600' : '400'};">${u.display_name.split(' ')[0]}</span>
                                    </div>`;
                        }).join('')}
                    </div>
                </div>
            `).join('');
            calculateAITotals();
        }

        window.toggleAIAssign = function(itemIndex, userId) {
            const item = aiItems[itemIndex];
            if (item.assignedTo.includes(userId)) {
                item.assignedTo = item.assignedTo.filter(id => id !== userId);
            } else {
                item.assignedTo.push(userId);
            }
            renderAIItems();
        };

        function calculateAITotals() {
            let totals = {};
            let selectedItemsTotal = 0;
            
            state.users.forEach(u => totals[u.id] = 0);

            aiItems.forEach(item => {
                if (item.assignedTo.length > 0) {
                    const splitPrice = item.price / item.assignedTo.length;
                    item.assignedTo.forEach(id => {
                        totals[id] += splitPrice;
                    });
                    selectedItemsTotal += item.price;
                }
            });

            // Proporsikan pajak dan diskon ke setiap orang
            // Rumus: (Total yang dibayarkan struk / Total harga semua barang) * harga barang yang diassign
            const sumAllItems = aiItems.reduce((s, i) => s + i.price, 0);
            const ratio = (sumAllItems > 0 && aiGrandTotal > 0) ? (aiGrandTotal / sumAllItems) : 1;
            
            let finalAllocatedTotal = 0;

            // Update global amount (ini adalah total yang sebenarnya ditagihkan ke semua orang terpilih)
            // Bukan aiGrandTotal utuh, melainkan aiGrandTotal yang sudah diskalakan sesuai barang yang dipilih
            // Misalnya jika barang B tidak dipilih siapapun, total expense tidak boleh memasukkan barang B
            document.getElementById('amount').value = Math.round(selectedItemsTotal * ratio);
            
            // Check checkboxes and set amounts
            document.querySelectorAll('.user-checkbox').forEach(cb => {
                const userId = parseInt(cb.dataset.userId);
                const input = cb.querySelector('input[type="checkbox"]');
                const amtInput = cb.querySelector('.user-amount input');
                
                if (totals[userId] > 0) {
                    input.checked = true;
                    cb.classList.add('selected');
                    const finalShare = Math.round(totals[userId] * ratio);
                    amtInput.value = finalShare;
                    finalAllocatedTotal += finalShare;
                } else {
                    input.checked = false;
                    cb.classList.remove('selected');
                    amtInput.value = '';
                }
            });

            // Handle rounding errors (e.g. 100 divided by 3 is 33, 33, 33 sum=99)
            // Selisih kita tambahkan ke orang pertama saja agar jumlahnya pas
            const expectedTotal = Math.round(selectedItemsTotal * ratio);
            const diff = expectedTotal - finalAllocatedTotal;
            if (diff !== 0 && expectedTotal > 0) {
                // Find first selected user and adjust
                for (const cb of document.querySelectorAll('.user-checkbox.selected')) {
                    const amtInput = cb.querySelector('.user-amount input');
                    if (amtInput.value) {
                        amtInput.value = parseInt(amtInput.value) + diff;
                        break;
                    }
                }
            }

            // Only update DOM perPersonAmount text without calling updateSplit() loop
            const selected = getSelected();
            const el = document.getElementById('perPersonAmount');
            if (selected.length === 0) { el.textContent = 'Rp 0'; }
            else { el.textContent = formatCurrencyPlain(selected.reduce((s, u) => s + u.amount, 0)); }
        }

        // Make sure btnAIOcr has click listener
        setTimeout(() => {
            const btnAIOcr = document.getElementById('btnAIOcr');
            if (btnAIOcr) btnAIOcr.addEventListener('click', scanReceiptWithAI);
        }, 100);

</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="theme-color" content="#fafafa">
    <title>Catat Pengeluaran - Catatan Kontrakan</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="icons/icon-512.png">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body { animation: pageFadeIn 0.15s ease; }
        @keyframes pageFadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>

<body>
    <div class="container">
        <div class="page-header">
            <a href="dashboard.html" class="back-btn">
                <svg viewBox="0 0 24 24">
                    <line x1="19" y1="12" x2="5" y2="12" />
                    <polyline points="12 19 5 12 12 5" />
                </svg>
                Kembali
            </a>
            <button class="icon-btn" onclick="toggleTheme()"><span class="theme-toggle-icon"></span></button>
        </div>

        <h1 style="margin-bottom: var(--space-xl);">Catat Pengeluaran</h1>

        <form id="expenseForm">
            <div class="form-group">
                <label class="form-label">Nominal (Rp)</label>
                <input type="number" class="form-control" id="amount" placeholder="0" required min="1"
                    inputmode="numeric">
            </div>

            <div class="form-group">
                <label class="form-label">Deskripsi</label>
                <input type="text" class="form-control" id="description" placeholder="Contoh: Listrik Desember"
                    required>
            </div>

            <div class="form-group">
                <label class="form-label">Kategori</label>
                <select class="form-control" id="category" required>
                    <option value="">Pilih kategori</option>
                    <option value="Listrik">Listrik</option>
                    <option value="Air">Air</option>
                    <option value="Keamanan & Kebersihan">Keamanan & Kebersihan</option>
                    <option value="Titip Makanan">Titip Makanan</option>
                    <option value="Lainnya">Lainnya</option>
                </select>
            </div>

            <div class="form-group">
                <label class="form-label">Bukti (Opsional)</label>
                <div class="upload-area" id="uploadArea">
                    <svg viewBox="0 0 24 24"
                        style="width: 24px; height: 24px; stroke: var(--text-muted); stroke-width: 1.5; fill: none; margin-bottom: 8px;">
                        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z" />
                        <circle cx="12" cy="13" r="4" />
                    </svg>
                    <div>Tap untuk upload</div>
                    <input type="file" id="receiptInput" accept="image/*" hidden>
                    <img id="receiptPreview" class="upload-preview hidden">
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Pembagian</label>
                <div class="split-toggle">
                    <button type="button" id="btnSplitEqual" class="active">Bagi Rata</button>
                    <button type="button" id="btnSplitCustom">Nominal Beda</button>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Siapa yang ikut?</label>
                <div class="user-grid" id="userGrid"></div>
            </div>

            <div class="section" style="margin-bottom: var(--space-lg);">
                <div style="display: flex; justify-content: space-between;">
                    <span class="text-muted">Per orang:</span>
                    <span style="font-weight: 600;" id="perPersonAmount">Rp 0</span>
                </div>
            </div>

            <button type="submit" class="btn btn-primary btn-full btn-lg" id="submitBtn">Simpan</button>
        
            <div class="form-group" id="aiBtnGroup" style="display: none; margin-top: 8px;">
                <button type="button" id="btnAIOcr" class="btn btn-wa btn-full" style="display: flex; justify-content: center; align-items: center; gap: 8px; font-weight: 600;">
                    <span>✨</span> Auto Split Struk dengan AI
                </button>
            </div>

            <div id="aiItemsSection" class="form-group hidden" style="margin-top: var(--space-md); border-top: 1px solid var(--border-color); padding-top: var(--space-md);">
                <label class="form-label">Daftar Item (Tap nama untuk assign)</label>
                <div id="aiItemsList" style="display: flex; flex-direction: column; gap: 10px;"></div>
            </div>

            </form>
    </div>

    <script src="js/icons.js"></script>
    <script src="js/config.js"></script>
    <script src="js/app.js"></script>
    <script>
        let uploadedFilePath = null;
        let splitMode = 'equal';
        let isAiMode = false;

        (async () => {
            if (!await checkAuth()) { window.location.href = 'login.html'; return; }
            await loadUsers();
            renderUserGrid();
        })();

        function renderUserGrid() {
            const container = document.getElementById('userGrid');
            container.innerHTML = state.users.map(u => {
                const isMe = u.id == state.user.id;
                return `
                    <label class="user-checkbox ${isMe ? 'selected' : ''}" data-user-id="${u.id}">
                        <input type="checkbox" value="${u.id}" ${isMe ? 'checked' : ''}>
                        <span class="user-name">${u.display_name}${isMe ? ' (kamu)' : ''}</span>
                        <div class="user-amount ${splitMode === 'custom' ? '' : 'hidden'}">
                            <input type="number" placeholder="0" min="0" inputmode="numeric" onchange="updateSplit()" onclick="event.stopPropagation()">
                        </div>
                    </label>
                `;
            }).join('');

            container.querySelectorAll('.user-checkbox').forEach(cb => {
                cb.addEventListener('click', (e) => {
                    if (e.target.tagName === 'INPUT' && e.target.type === 'number') return;
                    const input = cb.querySelector('input[type="checkbox"]');
                    input.checked = !input.checked;
                    cb.classList.toggle('selected', input.checked);
                    updateSplit();
                });
            });
        }

        document.getElementById('btnSplitEqual').addEventListener('click', () => {
            splitMode = 'equal';
            document.getElementById('btnSplitEqual').classList.add('active');
            document.getElementById('btnSplitCustom').classList.remove('active');
            document.querySelectorAll('.user-amount').forEach(el => el.classList.add('hidden'));
            updateSplit();
        });

        document.getElementById('btnSplitCustom').addEventListener('click', () => {
            splitMode = 'custom';
            document.getElementById('btnSplitCustom').classList.add('active');
            document.getElementById('btnSplitEqual').classList.remove('active');
            document.querySelectorAll('.user-amount').forEach(el => el.classList.remove('hidden'));
            updateSplit();
        });

        function getSelected() {
            const users = [];
            document.querySelectorAll('.user-checkbox').forEach(cb => {
                const input = cb.querySelector('input[type="checkbox"]');
                if (input.checked) {
                    const amt = splitMode === 'custom' ? (parseFloat(cb.querySelector('.user-amount input').value) || 0) : 0;
                    users.push({ user_id: parseInt(cb.dataset.userId), amount: amt });
                }
            });
            return users;
        }

        function updateSplit() {
            const total = parseFloat(document.getElementById('amount').value) || 0;
            const selected = getSelected();
            const el = document.getElementById('perPersonAmount');

            if (selected.length === 0) { el.textContent = 'Rp 0'; return; }

            if (splitMode === 'equal') {
                el.textContent = formatCurrencyPlain(Math.ceil(total / selected.length));
            } else {
                el.textContent = formatCurrencyPlain(selected.reduce((s, u) => s + u.amount, 0));
            }
        }

        document.getElementById('amount').addEventListener('input', updateSplit);

        const uploadArea = document.getElementById('uploadArea');
        const receiptInput = document.getElementById('receiptInput');
        const receiptPreview = document.getElementById('receiptPreview');

        uploadArea.addEventListener('click', () => receiptInput.click());

        receiptInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (e) => {
                receiptPreview.src = e.target.result;
                receiptPreview.classList.remove('hidden');
                uploadArea.classList.add('has-file');
            };
            reader.readAsDataURL(file);

            try {
                const result = await uploadReceipt(file);
                uploadedFilePath = result.path;
                showToast('Uploaded', 'success');
                const aiBtnGroup = document.getElementById('aiBtnGroup');
                if (aiBtnGroup) aiBtnGroup.style.display = 'block';
            } catch (err) { showToast('Gagal upload', 'error'); }
        });

        document.getElementById('expenseForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const total = parseFloat(document.getElementById('amount').value);
            const desc = document.getElementById('description').value.trim();
            const cat = document.getElementById('category').value;
            const selected = getSelected();

            if (selected.length === 0) { showToast('Pilih orang', 'error'); return; }

            let splits;
            if (splitMode === 'equal') {
                const perPerson = Math.ceil(total / selected.length);
                splits = selected.map(u => ({ user_id: u.user_id, amount: perPerson }));
            } else {
                splits = selected.map(u => ({ user_id: u.user_id, amount: u.amount }));
            }

            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.textContent = 'Menyimpan...';

            try {
                await createExpense({ amount: total, description: desc, category: cat, receipt_image: uploadedFilePath, splits });
                showToast('Tersimpan!', 'success');
                setTimeout(() => window.location.href = 'dashboard.html', 800);
            } catch (err) {
                showToast('Gagal', 'error');
                btn.disabled = false;
                btn.textContent = 'Simpan';
            }
        });
    </script>
</body>

</html>
